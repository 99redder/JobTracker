name: Deploy JobTracker to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate runtime Firebase config
        run: |
          python3 -c "
          import json, os
          cfg = {
            'apiKey': os.environ['JT_FIREBASE_API_KEY'],
            'authDomain': os.environ['JT_FIREBASE_AUTH_DOMAIN'],
            'projectId': os.environ['JT_FIREBASE_PROJECT_ID'],
            'storageBucket': os.environ['JT_FIREBASE_STORAGE_BUCKET'],
            'messagingSenderId': os.environ['JT_FIREBASE_MESSAGING_SENDER_ID'],
            'appId': os.environ['JT_FIREBASE_APP_ID'],
          }
          print('window.JOBTRACKER_FIREBASE_CONFIG = ' + json.dumps(cfg) + ';')
          " > firebase-config.local.js
        env:
          JT_FIREBASE_API_KEY: ${{ secrets.JT_FIREBASE_API_KEY }}
          JT_FIREBASE_AUTH_DOMAIN: ${{ secrets.JT_FIREBASE_AUTH_DOMAIN }}
          JT_FIREBASE_PROJECT_ID: ${{ secrets.JT_FIREBASE_PROJECT_ID }}
          JT_FIREBASE_STORAGE_BUCKET: ${{ secrets.JT_FIREBASE_STORAGE_BUCKET }}
          JT_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.JT_FIREBASE_MESSAGING_SENDER_ID }}
          JT_FIREBASE_APP_ID: ${{ secrets.JT_FIREBASE_APP_ID }}

      - name: Prepare static artifact
        run: |
          set -euo pipefail
          rm -rf .pages
          mkdir .pages
          cp \
            index.html \
            styles.css \
            app.js \
            sw.js \
            sw-register.js \
            manifest.json \
            firebase-config.local.js \
            favicon-16x16.png \
            favicon-32x32.png \
            favicon-48x48.png \
            apple-touch-icon.png \
            icon-192x192.png \
            icon-512x512.png \
            .pages/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
